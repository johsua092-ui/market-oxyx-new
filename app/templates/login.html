{% extends "base.html" %}

{% block title %}Login - Oxyx Builds{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Login ke Oxyx Builds</h2>

    <form method="POST" class="auth-form">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username"
                   placeholder="Username kamu" required
                   autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password"
                   placeholder="Password kamu" required
                   autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary btn-block">Login</button>
    </form>

    <p class="auth-link">Belum punya akun? <a href="/register">Daftar di sini</a></p>
</div>
{% endblock %}
